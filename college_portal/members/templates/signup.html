{% extends "portal/base.html" %}
{% block title %}Student Sign Up - College Portal{% endblock %}

{% block content %}
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="form-container shadow-sm">
                <h3 class="section-heading text-center">
                    <i class="bi bi-person-plus-fill"></i> Student Sign Up
                </h3>

                <form method="POST" action="{% url 'signup' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" name="full_name" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label for="rollNumber" class="form-label">Roll Number</label>
                        <input type="text" class="form-control" id="rollNumber" name="roll_number" placeholder="Enter your roll number" required>
                    </div>

                    <div class="mb-3">
                        <label for="dob" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="dob" name="dob" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="example@college.edu" required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="10-digit phone number" pattern="[0-9]{10}" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                            <span class="input-group-text toggle-password" data-target="password" style="cursor:pointer;">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPassword" name="confirm_password" placeholder="Re-enter password" required>
                            <span class="input-group-text toggle-password" data-target="confirmPassword" style="cursor:pointer;">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>
                        <div id="passwordMismatch" class="text-danger small mt-1 d-none">
                            Passwords do not match.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="bi bi-check-circle"></i> Sign Up
                    </button>

                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}?role=student">Login here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(function (icon) {
        icon.addEventListener('click', function () {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            const iconTag = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                iconTag.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                iconTag.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    });

    // Simple client-side check: passwords match
    const form = document.querySelector('form');
    form.addEventListener('submit', function (e) {
        const pass = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const mismatchMsg = document.getElementById('passwordMismatch');
        if (pass !== confirmPass) {
            e.preventDefault();
            mismatchMsg.classList.remove('d-none');
        } else {
            mismatchMsg.classList.add('d-none');
        }
    });
</script>
{% endblock %}
