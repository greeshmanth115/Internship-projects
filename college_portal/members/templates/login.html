{% extends "portal/base.html" %}
{% block title %}Login - College Portal{% endblock %}

{% block content %}
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="form-container shadow-sm">
                <h3 class="section-heading text-center">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </h3>

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="role" class="form-label">Login As</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="" disabled selected>Select role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Username / Roll Number</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter username or roll number" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                            <span class="input-group-text toggle-password" data-target="password" style="cursor:pointer;">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>

                    <p class="text-center mt-3 mb-0">
                        New student?
                        <a href="{% url 'signup' %}">Sign up here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    // Pre-select role from URL query string, e.g. login/?role=student
    document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        if (role) {
            const roleSelect = document.getElementById('role');
            for (let i = 0; i < roleSelect.options.length; i++) {
                if (roleSelect.options[i].value === role) {
                    roleSelect.selectedIndex = i;
                    break;
                }
            }
        }
    });

    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(function (icon) {
        icon.addEventListener('click', function () {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            const iconTag = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                iconTag.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                iconTag.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    });
</script>
{% endblock %}
