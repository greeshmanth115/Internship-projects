{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | College Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'portal/css/style.css' %}" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
          <i class="bi bi-mortarboard-fill me-2"></i>College Portal
        </a>
        <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Back to Home
        </a>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h4 class="fw-bold text-primary text-center mb-1">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
              </h4>
              <p class="text-muted text-center small mb-4">
                Sign in to your account
              </p>

              <!-- Error message from Django -->
              {% if error %}
              <div class="alert alert-danger py-2 small">{{ error }}</div>
              {% endif %}

              <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <!-- Role -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Login As</label>
                  <select name="role" id="role" class="form-select" required>
                    <option value="">Select Role</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>

                <!-- Username / Roll Number -->
                <div class="mb-3">
                  <label class="form-label fw-semibold" id="usernameLabel"
                    >Username / Roll Number</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-person"></i
                    ></span>
                    <input
                      type="text"
                      name="username"
                      class="form-control"
                      placeholder="Enter username or roll number"
                      required
                    />
                  </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                  <label class="form-label fw-semibold">Password</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-lock"></i
                    ></span>
                    <input
                      type="password"
                      name="password"
                      id="loginPwd"
                      class="form-control"
                      placeholder="Enter password"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="toggleLoginPwd"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 fw-semibold"
                >
                  <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>

                <p class="text-center text-muted small mt-3">
                  New student?
                  <a href="{% url 'signup' %}">Create an account</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'portal/js/script.js' %}"></script>
    <script>
      // Toggle password visibility
      document
        .getElementById("toggleLoginPwd")
        .addEventListener("click", function () {
          const pwd = document.getElementById("loginPwd");
          const icon = this.querySelector("i");
          pwd.type = pwd.type === "password" ? "text" : "password";
          icon.classList.toggle("bi-eye");
          icon.classList.toggle("bi-eye-slash");
        });

      // Update label based on role
      document.getElementById("role").addEventListener("change", function () {
        const label = document.getElementById("usernameLabel");
        label.textContent =
          this.value === "student" ? "Roll Number" : "Username";
      });
    </script>
  </body>
</html>
