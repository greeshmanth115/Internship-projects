{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Sign Up | College Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'portal/css/style.css' %}" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
          <i class="bi bi-mortarboard-fill me-2"></i>College Portal
        </a>
        <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Back to Home
        </a>
      </div>
    </nav>

    <!-- Signup Form -->
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h4 class="fw-bold text-primary mb-1 text-center">
                <i class="bi bi-person-plus-fill me-2"></i>Student Sign Up
              </h4>
              <p class="text-muted text-center small mb-4">
                Create your student account
              </p>

              <!-- Django will render form errors here -->
              {% if form.errors %}
              <div class="alert alert-danger py-2 small">
                Please fix the errors below.
              </div>
              {% endif %}

              <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}

                <!-- Name -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Full Name</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-person"></i
                    ></span>
                    <input
                      type="text"
                      name="name"
                      class="form-control"
                      placeholder="Enter your full name"
                      required
                      value="{{ form.name.value|default:'' }}"
                    />
                  </div>
                </div>

                <!-- Roll Number -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Roll Number</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-123"></i
                    ></span>
                    <input
                      type="text"
                      name="roll_number"
                      class="form-control"
                      placeholder="e.g. 21CS001"
                      required
                      value="{{ form.roll_number.value|default:'' }}"
                    />
                  </div>
                </div>

                <!-- Branch & Year (side by side) -->
                <div class="row mb-3">
                  <div class="col-6">
                    <label class="form-label fw-semibold">Branch</label>
                    <select name="branch" class="form-select" required>
                      <option value="">Select</option>
                      <option value="CSE">CSE</option>
                      <option value="ECE">ECE</option>
                      <option value="EEE">EEE</option>
                      <option value="MECH">MECH</option>
                      <option value="CIVIL">CIVIL</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label fw-semibold">Year</label>
                    <select name="year" class="form-select" required>
                      <option value="">Select</option>
                      <option value="1">1st Year</option>
                      <option value="2">2nd Year</option>
                      <option value="3">3rd Year</option>
                      <option value="4">4th Year</option>
                    </select>
                  </div>
                </div>

                <!-- Date of Birth -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Date of Birth</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-calendar"></i
                    ></span>
                    <input
                      type="date"
                      name="dob"
                      class="form-control"
                      required
                      value="{{ form.dob.value|default:'' }}"
                    />
                  </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Email Address</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-envelope"></i
                    ></span>
                    <input
                      type="email"
                      name="email"
                      class="form-control"
                      placeholder="student@email.com"
                      required
                      value="{{ form.email.value|default:'' }}"
                    />
                  </div>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Phone Number</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-phone"></i
                    ></span>
                    <input
                      type="tel"
                      name="phone"
                      class="form-control"
                      placeholder="10-digit number"
                      maxlength="10"
                      required
                      value="{{ form.phone.value|default:'' }}"
                    />
                  </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Password</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-lock"></i
                    ></span>
                    <input
                      type="password"
                      name="password"
                      id="password"
                      class="form-control"
                      placeholder="Create a password"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="togglePwd"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                  <label class="form-label fw-semibold">Confirm Password</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-lock-fill"></i
                    ></span>
                    <input
                      type="password"
                      name="confirm_password"
                      id="confirmPwd"
                      class="form-control"
                      placeholder="Repeat your password"
                      required
                    />
                  </div>
                  <div id="pwdMismatch" class="text-danger small mt-1 d-none">
                    Passwords do not match.
                  </div>
                </div>

                <!-- Submit -->
                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 fw-semibold"
                >
                  <i class="bi bi-person-check me-2"></i>Create Account
                </button>

                <p class="text-center text-muted small mt-3">
                  Already have an account?
                  <a href="{% url 'login' %}">Login here</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'portal/js/script.js' %}"></script>
    <script>
      // Toggle password visibility
      document
        .getElementById("togglePwd")
        .addEventListener("click", function () {
          const pwd = document.getElementById("password");
          const icon = this.querySelector("i");
          pwd.type = pwd.type === "password" ? "text" : "password";
          icon.classList.toggle("bi-eye");
          icon.classList.toggle("bi-eye-slash");
        });

      // Confirm password match check
      document
        .getElementById("confirmPwd")
        .addEventListener("input", function () {
          const pwd = document.getElementById("password").value;
          const msg = document.getElementById("pwdMismatch");
          msg.classList.toggle(
            "d-none",
            this.value === pwd || this.value === "",
          );
        });
    </script>
  </body>
</html>
