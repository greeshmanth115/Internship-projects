{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Faculty | College Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'portal/css/style.css' %}" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'admin_dashboard' %}">
          <i class="bi bi-mortarboard-fill me-2"></i>College Portal — Admin
        </a>
        <a
          href="{% url 'admin_dashboard' %}"
          class="btn btn-outline-light btn-sm"
        >
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
      </div>
    </nav>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h5 class="fw-bold text-primary mb-4">
                <i class="bi bi-pencil-square me-2"></i>Edit Faculty
              </h5>
              <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                  <label class="form-label fw-semibold">Full Name</label>
                  <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ faculty.name }}"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Department</label>
                  <select name="department" class="form-select" required>
                    <option
                      value="CSE"
                      {%
                      if
                      faculty.department=""
                      ="CSE"
                      %}selected{%
                      endif
                      %}
                    >
                      CSE
                    </option>
                    <option
                      value="ECE"
                      {%
                      if
                      faculty.department=""
                      ="ECE"
                      %}selected{%
                      endif
                      %}
                    >
                      ECE
                    </option>
                    <option
                      value="EEE"
                      {%
                      if
                      faculty.department=""
                      ="EEE"
                      %}selected{%
                      endif
                      %}
                    >
                      EEE
                    </option>
                    <option
                      value="MECH"
                      {%
                      if
                      faculty.department=""
                      ="MECH"
                      %}selected{%
                      endif
                      %}
                    >
                      MECH
                    </option>
                    <option
                      value="CIVIL"
                      {%
                      if
                      faculty.department=""
                      ="CIVIL"
                      %}selected{%
                      endif
                      %}
                    >
                      CIVIL
                    </option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Email</label>
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ faculty.email }}"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label class="form-label fw-semibold">Phone</label>
                  <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    value="{{ faculty.phone }}"
                    maxlength="10"
                    required
                  />
                </div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>Save Changes
                  </button>
                  <a
                    href="{% url 'admin_dashboard' %}"
                    class="btn btn-secondary"
                    >Cancel</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
