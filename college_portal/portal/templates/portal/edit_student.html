{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Student | College Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'portal/css/style.css' %}"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'admin_dashboard' %}">
      <i class="bi bi-mortarboard-fill me-2"></i>College Portal — Admin
    </a>
    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-light btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>
</nav>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h5 class="fw-bold text-primary mb-4"><i class="bi bi-pencil-square me-2"></i>Edit Student</h5>
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="name" class="form-control" value="{{ student.name }}" required/>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Branch</label>
                <select name="branch" class="form-select" required>
                  {% for b in "CSE ECE EEE MECH CIVIL".split %}
                  <option value="{{ b }}" {% if student.branch == b %}selected{% endif %}>{{ b }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Year</label>
                <select name="year" class="form-select" required>
                  {% for y in "1 2 3 4".split %}
                  <option value="{{ y }}" {% if student.year|stringformat:"s" == y %}selected{% endif %}>{{ y }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Semester</label>
              <select name="semester" class="form-select" required>
                {% for s in "1 2 3 4 5 6 7 8".split %}
                <option value="{{ s }}" {% if student.semester|stringformat:"s" == s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" value="{{ student.email }}" required/>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Phone</label>
              <input type="tel" name="phone" class="form-control" value="{{ student.phone }}" maxlength="10" required/>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Changes</button>
              <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
